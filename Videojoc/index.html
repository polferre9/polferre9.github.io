function buildPlatforms(scene, platData) {
  var group = scene.physics.add.staticGroup();
  platData.forEach(function(d) {
    var cx = d[0], topY = d[1], pw = d[2];
    var ph = 32;
    var rect = scene.add.rectangle(cx, topY + ph/2, pw, ph, 0x5a3e1a, 0);
    scene.physics.add.existing(rect, true);
    group.add(rect);
  });
  return group;
}

// ─────────────────────────────────────────────
// HELPER: crea bombes que patrullen horitzontalment
// ─────────────────────────────────────────────
function createPatrolBombs(scene, bombData) {
  var list = [];
  bombData.forEach(function(d) {
    var b = scene.physics.add.image(d.x, d.y, 'bomba');
    b.setScale(0.08).setDepth(8).setImmovable(true);
    b.body.allowGravity = false;
    b._startX = d.x;
    b._range  = d.range;
    b._speed  = (d.range > 0) ? 60 : 0;
    b._dir    = 1;
    list.push(b);
  });
  return list;
}
 
// ─────────────────────────────────────────────
// HELPER: personatge
// ─────────────────────────────────────────────
function createPlayer(scene, x, y) {
  var p = scene.physics.add.sprite(x, y, 'walk_r', 0);
  p.setScale(0.12);
  p.body.setSize(220, 300);
  p.body.setOffset(210, 40);
  p.setCollideWorldBounds(false).setBounce(0).setDepth(10);
  scene.physics.world.setBoundsCollision(true, true, true, false);
  p.play('anim_idle');
  return p;
}
 
// ─────────────────────────────────────────────
// HELPER: lògica update moviment (compartida pels dos nivells)
// ─────────────────────────────────────────────
function updatePlayer(scene) {
  var onGround = scene.player.body.blocked.down;
  var left  = scene.cursors.left.isDown;
  var right = scene.cursors.right.isDown;
  var jump  = Phaser.Input.Keyboard.JustDown(scene.spaceKey) ||
              Phaser.Input.Keyboard.JustDown(scene.cursors.up);
 
  if (left) {
    scene.player.setVelocityX(-200);
    scene._lastDir = 'l';
    if (onGround && scene.player.anims.currentAnim?.key !== 'anim_walk_l')
      scene.player.play('anim_walk_l');
  } else if (right) {
    scene.player.setVelocityX(200);
    scene._lastDir = 'r';
    if (onGround && scene.player.anims.currentAnim?.key !== 'anim_walk_r')
      scene.player.play('anim_walk_r');
  } else {
    scene.player.setVelocityX(0);
    if (onGround && !scene._jumping &&
        scene.player.anims.currentAnim?.key !== 'anim_idle')
      scene.player.play('anim_idle');
  }
 
  // Salt – només des de terra
  if (jump && onGround) {
    scene.player.setVelocityY(-520);
    scene._jumping = true;
    scene.player.play(scene._lastDir === 'l' ? 'anim_jump_l' : 'anim_jump_r');
  }
 
  // Aterratge
  if (!scene._wasOnGround && onGround) {
    scene._jumping = false;
    if (!left && !right) scene.player.play('anim_idle');
    else if (left)       scene.player.play('anim_walk_l');
    else                 scene.player.play('anim_walk_r');
  }
  scene._wasOnGround = onGround;
}
 
// ─────────────────────────────────────────────
// HELPER: actualitza patrulla bombes
// ─────────────────────────────────────────────
function updateBombs(bombList) {
  bombList.forEach(function(b) {
    if (!b.active || b._range === 0) return;
    b.x += b._speed * b._dir * (1/60);
    if (b.x > b._startX + b._range) b._dir = -1;
    if (b.x < b._startX - b._range) b._dir =  1;
    b.body.reset(b.x, b.y);
  });
}

class Level1Scene extends Phaser.Scene {
  constructor() { super({key:'Level1Scene'}); }
 
  create() {
    scoreGlobal = 0;
    this.dead    = false;
    this.won     = false;
    this.mCount  = 0;
    this.mNeeded = 5;
 
    var MAP_W = 60*32, MAP_H = 20*32;
    this.physics.world.setBounds(0, 0, MAP_W, MAP_H);
    this.physics.world.gravity.y = 600;
 
    if (this.textures.exists('bg1'))
      this.add.image(MAP_W/2,MAP_H/2,'bg1').setDisplaySize(MAP_W,MAP_H).setDepth(-10);
    else
      this.add.rectangle(MAP_W/2,MAP_H/2,MAP_W,MAP_H,0x1a2a3a).setDepth(-10);
 
    this.platforms = buildPlatforms(this, PLAT1);
 
    this.player = createPlayer(this, 208, 448 - 300*0.12 - 5);
    this.physics.add.collider(this.player, this.platforms);
 
    this.monedes = this.physics.add.staticGroup();
    COINS1.forEach(function(pos) {
      this.monedes.create(pos[0],pos[1],'moneda').setScale(0.08).refreshBody();
    }, this);
    this.physics.add.overlap(this.player, this.monedes, this.agafarMoneda, null, this);
 
    // Bombes patrulla
    this.bombList = createPatrolBombs(this, BOMBS1);
    var self = this;
    this.bombList.forEach(function(b) {
      self.physics.add.overlap(self.player, b, self.tocarBomba, null, self);
    });
 
    // Camera
    this.cameras.main.setBounds(0, 0, MAP_W, MAP_H);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
    this.cameras.main.setZoom(1.5);
 
    // HUD – setScrollFactor(0) fixa el text a la pantalla independentment de la camara
    var hs = {fontSize:'16px',fill:'#fff',stroke:'#000',strokeThickness:3,fontFamily:'monospace'};
    this.txtMonedes = this.add.text(10,10,'Monedes: 0/'+this.mNeeded,hs).setScrollFactor(0).setDepth(50);
    this.txtPunts   = this.add.text(10,32,'Punts: 0',hs).setScrollFactor(0).setDepth(50);
    this.add.text(W-10,10,'NIVELL 1',hs).setOrigin(1,0).setScrollFactor(0).setDepth(50);
 
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._lastDir     = 'r';
    this._wasOnGround = false;
    this._jumping     = false;
  }
 
  agafarMoneda(player, moneda) {
    moneda.disableBody(true, true);
    scoreGlobal += 10;
    this.mCount++;
    this.txtPunts.setText('Punts: '+scoreGlobal);
    this.txtMonedes.setText('Monedes: '+this.mCount+'/'+this.mNeeded);
 
    var em = this.add.particles(moneda.x,moneda.y,'moneda',{
      speed:80,scale:{start:0.08,end:0},lifespan:400,quantity:5
    }).setDepth(20);
    this.time.delayedCall(800,function(){ if(em&&em.active)em.destroy(); });
 
    if (this.mCount >= this.mNeeded) {
      this.won = true;
      scoreGlobal += 50;
      this.mostrarMissatge('Nivell 1 superat!\n+50 punts\nPassant al Nivell 2...', function() {
        this.scene.start('Level2Scene', {punts: scoreGlobal});
      });
    }
  }
 
  tocarBomba() {
    if (this.dead) return;
    this.dead = true;
    this.physics.pause();
    this.player.setTint(0xff3333);
    this.mostrarMissatge('BOOM! Has explotat!\nPunts: '+scoreGlobal, function() {
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'bomba'});
    });
  }
 
  caureAlBuit() {
    if (this.dead) return;
    this.dead = true;
    this.physics.pause();
    this.player.setTint(0x4444ff);
    this.mostrarMissatge("Has caigut al buit!\nProfe... m'has d'aprovar! \uD83D\uDE05\nPunts: "+scoreGlobal, function() {
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'buit'});
    });
  }
 
  mostrarMissatge(text, cb) {
    this.add.rectangle(W/2,H/2,440,130,0x000000,0.88).setScrollFactor(0).setDepth(60);
    this.add.text(W/2,H/2,text,{fontSize:'19px',fill:'#fff',fontFamily:'monospace',
      align:'center',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(61);
    this.time.delayedCall(2500,cb,[],this);
  }
 
  update() {
    if (this.dead || this.won) return;
    updatePlayer(this);
    if (this.player.y > 20*32+50) this.caureAlBuit();
    updateBombs(this.bombList);
  }
}

    this.mostrarMissatge("Has caigut al buit!\nProfe... m'has d'aprovar! \uD83D\uDE05\nPunts: "+scoreGlobal, function() {
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'buit'});
    });
  }
 
  mostrarMissatge(text, cb) {
    this.add.rectangle(W/2,H/2,440,130,0x000000,0.88).setScrollFactor(0).setDepth(60);
    this.add.text(W/2,H/2,text,{fontSize:'19px',fill:'#fff',fontFamily:'monospace',
      align:'center',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(61);
    this.time.delayedCall(2500,cb,[],this);
  }
 
  update() {
    if (this.dead || this.won) return;
    updatePlayer(this);
    if (this.player.y > 20*32+50) this.caureAlBuit();
    updateBombs(this.bombList);
  }
}
 
// ─────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────
class GameOverScene extends Phaser.Scene {
  constructor() { super({key:'GameOverScene'}); }
  init(data) {
    this.guanyat  = data ? !!data.guanyat : false;
    this.punts    = data ? (data.punts||scoreGlobal) : scoreGlobal;
    this.missatge = data ? (data.missatge||'bomba') : 'bomba';
  }
  create() {
    this.add.rectangle(W/2,H/2,W,H,0x060610);
    if (this.textures.exists('logotip'))
      this.add.image(W/2,72,'logotip').setScale(0.22).setAlpha(0.6);
    this.add.text(W/2,155,this.guanyat?'ENHORABONA!':'GAME OVER',{
      fontSize:'44px',fill:this.guanyat?'#66ff88':'#ff4444',
      fontFamily:'monospace',stroke:'#000',strokeThickness:6
    }).setOrigin(0.5);
    var subtext = this.guanyat ? 'Has completat els dos nivells!'
      : (this.missatge==='buit' ? "Profe... m'has d'aprovar! \uD83D\uDE05" : 'Has tocat una bomba...');
    this.add.text(W/2,215,subtext,{fontSize:'18px',fill:'#aaaacc',fontFamily:'monospace'}).setOrigin(0.5);
    this.add.text(W/2,268,'Puntuaci\u00f3: '+this.punts,{
      fontSize:'28px',fill:'#ffdd44',fontFamily:'monospace',stroke:'#443300',strokeThickness:4
    }).setOrigin(0.5);
    this.add.text(W/2,350,'POL FERR\u00c9 \u2013 CoinJump',{
      fontSize:'14px',fill:'#444466',fontFamily:'monospace',align:'center'
    }).setOrigin(0.5);
    var btn = this.add.text(W/2,428,'[ ESPAI \u2013 Torna a jugar ]',{
      fontSize:'18px',fill:'#66aaff',fontFamily:'monospace',stroke:'#000033',strokeThickness:3
    }).setOrigin(0.5);
    this.tweens.add({targets:btn,alpha:0.1,duration:600,yoyo:true,repeat:-1});
    var eTex = this.guanyat
      ? (this.textures.exists('moneda')?'moneda':null)
      : (this.textures.exists('bomba')?'bomba':null);
    if (eTex) {
      this.add.particles(0,0,eTex,{
        x:{min:0,max:W},y:-10,scale:{start:0.09,end:0},alpha:{start:0.7,end:0},
        speedY:{min:60,max:130},lifespan:4000,
        frequency:this.guanyat?200:600,quantity:1
      });
    }
    this.input.keyboard.once('keydown-SPACE',function(){
      scoreGlobal=0; this.scene.start('TitleScene');
    },this);
  }
}
 
// ─────────────────────────────────────────────
// INICIAR JOC
// ─────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  physics: {default:'arcade', arcade:{gravity:{y:0}, debug:false}},
  scene: [BootScene, LoadingScene, TitleScene, Level1Scene, Level2Scene, GameOverScene]
});
</script>
