<!doctype html>
<html lang="ca">
<head>
  <meta charset="UTF-8"/>
  <title>CoinJump – Pol Ferré</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; }
    #hud {
      position:absolute;
      top:0; left:50%;
      transform:translateX(-50%);
      width:800px;
      pointer-events:none;
      z-index:10;
    }
    #hud-box {
      position:absolute;
      top:10px; left:10px;
      background:rgba(0,0,0,0.72);
      padding:7px 14px 7px 10px;
      border-radius:6px;
      font-family:monospace;
      font-size:17px;
      color:#ffe000;
      text-shadow:0 0 4px #000, 1px 1px 0 #000;
      line-height:1.5;
      display:none;
    }
    #hud-nivell {
      position:absolute;
      top:10px; right:10px;
      background:rgba(0,0,0,0.72);
      padding:7px 12px;
      border-radius:6px;
      font-family:monospace;
      font-size:17px;
      color:#ffe000;
      text-shadow:0 0 4px #000, 1px 1px 0 #000;
      display:none;
    }
  </style>
</head>
<body>
<div id="hud">
  <div id="hud-box">
    <div id="hud-monedes">Monedes: 0/5</div>
    <div id="hud-punts">Punts: 0</div>
  </div>
  <div id="hud-nivell" id="hud-nivell">NIVELL 1</div>
</div>
<script>
var W = 800, H = 500;
var scoreGlobal = 0;
var bgMusic = null;
 
// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super({key:'BootScene'}); }
  preload() {
    this.load.on('loaderror', function(){});
    this.load.image('logotip','assets/logotip.png');
  }
  create() { this.scene.start('LoadingScene'); }
}
 
// ─────────────────────────────────────────────
// LOADING
// ─────────────────────────────────────────────
class LoadingScene extends Phaser.Scene {
  constructor() { super({key:'LoadingScene'}); }

  preload() {
    // En preload es crea el visual i es carreguen assets.

    this.add.rectangle(W/2,H/2,W,H,0x06060f);

    // Estrelles
    var sg = this.add.graphics();
    sg.fillStyle(0xffffff,1);
    for(var i=0;i<80;i++){
      var sx=Phaser.Math.Between(0,W), sy=Phaser.Math.Between(0,H-50);
      sg.fillRect(sx,sy,Math.random()<0.3?2:1,Math.random()<0.25?2:1);
    }

    // Terra
    var gg = this.add.graphics();
    for(var bx=0;bx<W;bx+=16){
      gg.fillStyle(0x4a7c2f,1); gg.fillRect(bx,H-32,16,10);
      gg.fillStyle(0x6b4226,1); gg.fillRect(bx,H-22,16,22);
      gg.fillStyle(0x2a5010,1); gg.fillRect(bx,H-32,16,2);
    }

    // Logotip (ja carregat al BootScene)
    if (this.textures.exists('logotip')) {
      var logo = this.add.image(W/2, 145, 'logotip');
      logo.setScale(520 / logo.width);
    } else {
      this.add.text(W/2,110,'COINJUMP',{fontSize:'36px',fill:'#ffdd44',fontFamily:'"Press Start 2P"',stroke:'#aa7700',strokeThickness:6}).setOrigin(0.5);
    }

    // Text carregant
    this.add.text(W/2, H-102, 'CARREGANT...', {
      fontSize:'8px', fill:'#6677cc', fontFamily:'"Press Start 2P"'
    }).setOrigin(0.5);

    // Barra de fons
    var barBg = this.add.graphics();
    barBg.fillStyle(0x111133,1); barBg.fillRect(W/2-202,H-82,404,24);
    barBg.lineStyle(2,0x4444aa,1); barBg.strokeRect(W/2-202,H-82,404,24);
    barBg.fillStyle(0xffdd44,1);
    barBg.fillRect(W/2-218,H-82,14,24);
    barBg.fillRect(W/2+204,H-82,14,24);

    // Barra de progress
    var barFill = this.add.graphics();
    this.load.on('progress', function(v) {
      barFill.clear();
      var filledW = Math.floor(400 * v / 8) * 8;
      for(var bx=0; bx<filledW; bx+=8){
        barFill.fillStyle(bx < filledW*0.6 ? 0x2255ff : 0x44aaff, 1);
        barFill.fillRect(W/2-200+bx, H-80, 7, 20);
      }
    });

    this.load.on('loaderror',function(f){ console.warn('No es pot carregar:',f.key); });

    this.load.image('bg1','assets/nivell1.png');
    this.load.image('bg2','assets/nivell2.png');
    this.load.image('moneda','assets/moneda.png');
    this.load.image('bomba','assets/bomba.png');
    this.load.audio('snd_moneda','assets/moneda.mp3');
    this.load.audio('snd_derrota','assets/derrota.mp3');
    this.load.audio('snd_musica','assets/musica_retro_bucle.mp3');
    this.load.spritesheet('walk_r','assets/personatge_coinjump_caminant_dreta.png',{frameWidth:640,frameHeight:376});
    this.load.spritesheet('walk_l','assets/personatge_coinjump_caminant_esquerra.png',{frameWidth:640,frameHeight:376});
    this.load.spritesheet('jump_r','assets/personatge_coinjump_salt_dreta.png',{frameWidth:640,frameHeight:376});
    this.load.spritesheet('jump_l','assets/personatge_coinjump_salt_esquerra.png',{frameWidth:640,frameHeight:376});
  }

  create() {
    this.anims.create({key:'anim_walk_r', frames:this.anims.generateFrameNumbers('walk_r',{start:0,end:6}), frameRate:10, repeat:-1});
    this.anims.create({key:'anim_walk_l', frames:this.anims.generateFrameNumbers('walk_l',{start:0,end:6}), frameRate:10, repeat:-1});
    this.anims.create({key:'anim_jump_r', frames:this.anims.generateFrameNumbers('jump_r',{start:0,end:8}), frameRate:12, repeat:0});
    this.anims.create({key:'anim_jump_l', frames:this.anims.generateFrameNumbers('jump_l',{start:0,end:8}), frameRate:12, repeat:0});
    this.anims.create({key:'anim_idle',   frames:this.anims.generateFrameNumbers('walk_r',{start:0,end:0}), frameRate:1, repeat:-1});
    this.time.delayedCall(400, function(){ this.scene.start('TitleScene'); }, [], this);
  }
}

      sg.fillRect(sx,sy,Math.random()<0.25?2:1,Math.random()<0.25?2:1);
    }

    // Terra pixelada a baix
    var gg = this.add.graphics();
    for(var bx=0;bx<W;bx+=16){
      gg.fillStyle(0x4a7c2f,1); gg.fillRect(bx,H-40,16,12);
      gg.fillStyle(0x6b4226,1); gg.fillRect(bx,H-28,16,28);
      gg.fillStyle(0x2a5010,1); gg.fillRect(bx,H-40,16,2);
    }
    // Petits blocs decoratius sobre el terra
    [80,200,350,500,650,750].forEach(function(bx){
      gg.fillStyle(0x4a7c2f,1); gg.fillRect(bx,H-56,32,16);
      gg.fillStyle(0x6b4226,1); gg.fillRect(bx,H-72,32,16);
      gg.fillStyle(0x2a5010,1); gg.fillRect(bx,H-56,32,2);
    });

    // Logotip gran
    if (this.textures.exists('logotip')) {
      var logo = this.add.image(W/2, 130, 'logotip');
      var targetW = Math.min(560, logo.width);
      logo.setScale(targetW / logo.width);
      this.tweens.add({targets:logo, y:136, duration:2000, yoyo:true, repeat:-1, ease:'Sine.easeInOut'});
    } else {
      this.add.text(W/2,100,'COINJUMP',{fontSize:'36px',fill:'#ffdd44',fontFamily:'"Press Start 2P"',stroke:'#aa7700',strokeThickness:6}).setOrigin(0.5);
    }

    // Subttol
    this.add.text(W/2,248,'- VIDEOJOC DE PLATAFORMES -',{
      fontSize:'7px',fill:'#5566aa',fontFamily:'"Press Start 2P"'
    }).setOrigin(0.5);

    // Instruccions en dues columnes en una caixa
    var boxX=W/2, boxY=330;
    this.add.rectangle(boxX,boxY,460,100,0x000000,0.55).setOrigin(0.5);
    this.add.rectangle(boxX,boxY,460,100,0x2233aa,0).setOrigin(0.5);
    // Linies de la caixa
    var bg2 = this.add.graphics();
    bg2.lineStyle(1,0x3344aa,0.8); bg2.strokeRect(boxX-230,boxY-50,460,100);
    bg2.lineStyle(1,0x2233aa,0.4); bg2.strokeRect(boxX-228,boxY-48,456,96);

    this.add.text(boxX-110, boxY-38,
      '\u2190 \u2192   Moure\n\u2191 / ESPAI   Saltar',
      {fontSize:'8px',fill:'#aabbdd',fontFamily:'"Press Start 2P"',lineSpacing:10}
    ).setOrigin(0.5,0);
    this.add.text(boxX+80, boxY-38,
      '5 monedes \u2192 Nivell 2\n8 monedes \u2192 Guanyes!',
      {fontSize:'8px',fill:'#aabbdd',fontFamily:'"Press Start 2P"',lineSpacing:10}
    ).setOrigin(0.5,0);
    // Separador vertical
    bg2.lineStyle(1,0x3344aa,0.6); bg2.lineBetween(boxX,boxY-42,boxX,boxY+42);

    // Boto parpellejant
    var btn = this.add.text(W/2,447,'[ PREM ESPAI PER JUGAR ]',{
      fontSize:'10px',fill:'#ffdd44',fontFamily:'"Press Start 2P"',stroke:'#553300',strokeThickness:3
    }).setOrigin(0.5);
    this.tweens.add({targets:btn,alpha:0.45,duration:1200,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});

    // Monedes que cauen millor: mes nombroses, rotacio, colors variats
    if (this.textures.exists('moneda')) {
      this.add.particles(0,0,'moneda',{
        x:{min:0,max:W}, y:-16,
        scale:{start:0.11,end:0.03},
        alpha:{start:0.9,end:0},
        speedY:{min:80,max:160},
        speedX:{min:-20,max:20},
        rotate:{min:0,max:360},
        lifespan:3500,
        frequency:180,
        quantity:1
      });
    }

    startBgMusic(this);
    this.input.keyboard.once('keydown-SPACE',function(){ this.scene.start('Level1Scene'); },this);
  }
}
 
// ─────────────────────────────────────────────
// HELPERS COMPARTITS
// ─────────────────────────────────────────────
function startBgMusic(scene) {
  if (bgMusic && bgMusic.isPlaying) return;
  if (scene.cache.audio.exists('snd_musica')) {
    bgMusic = scene.sound.add('snd_musica', {loop:true, volume:0.06});
    bgMusic.play();
  }
}
 
function buildPlatforms(scene, platData) {
  var group = scene.physics.add.staticGroup();
  platData.forEach(function(d) {
    var rect = scene.add.rectangle(d[0], d[1]+16, d[2], 32, 0x5a3e1a, 0);
    scene.physics.add.existing(rect, true);
    group.add(rect);
  });
  return group;
}
 
function createPlayer(scene, x, y) {
  var p = scene.physics.add.sprite(x, y, 'walk_r', 0);
  p.setScale(0.12);
  p.body.setSize(220, 300);
  p.body.setOffset(210, 40);
  p.setCollideWorldBounds(false).setBounce(0).setDepth(10);
  // Desactivem col.lisio amb la part superior i inferior del mon
  scene.physics.world.setBoundsCollision(true, true, false, false);
  p.play('anim_idle');
  return p;
}
 
function createPatrolBombs(scene, bombData) {
  return bombData.map(function(d) {
    var b = scene.physics.add.image(d.x, d.y, 'bomba');
    b.setScale(0.08).setDepth(8).setImmovable(true);
    b.body.allowGravity = false;
    // Reduim el hitbox de la bomba
    b.body.setSize(200, 200);
    b.body.setOffset(220, 160);
    b._startX = d.x; b._range = d.range;
    b._speed  = d.range > 0 ? 60 : 0; b._dir = 1;
    return b;
  });
}
 
function updatePlayer(scene) {
  var onGround = scene.player.body.blocked.down;
  var left  = scene.cursors.left.isDown;
  var right = scene.cursors.right.isDown;
  var jump  = Phaser.Input.Keyboard.JustDown(scene.spaceKey) || Phaser.Input.Keyboard.JustDown(scene.cursors.up);
 
  if (left) {
    scene.player.setVelocityX(-200); scene._lastDir = 'l';
    if (onGround && scene.player.anims.currentAnim?.key !== 'anim_walk_l') scene.player.play('anim_walk_l');
  } else if (right) {
    scene.player.setVelocityX(200); scene._lastDir = 'r';
    if (onGround && scene.player.anims.currentAnim?.key !== 'anim_walk_r') scene.player.play('anim_walk_r');
  } else {
    scene.player.setVelocityX(0);
    if (onGround && !scene._jumping && scene.player.anims.currentAnim?.key !== 'anim_idle') scene.player.play('anim_idle');
  }
 
  if (jump && onGround) {
    scene.player.setVelocityY(-520); scene._jumping = true;
    scene.player.play(scene._lastDir === 'l' ? 'anim_jump_l' : 'anim_jump_r');
  }
 
  if (!scene._wasOnGround && onGround) {
    scene._jumping = false;
    if (!left && !right) scene.player.play('anim_idle');
    else scene.player.play(left ? 'anim_walk_l' : 'anim_walk_r');
  }
  scene._wasOnGround = onGround;
}
 
function updateBombs(bombList) {
  bombList.forEach(function(b) {
    if (!b.active || b._range === 0) return;
    b.x += b._speed * b._dir * (1/60);
    if (b.x > b._startX + b._range) b._dir = -1;
    if (b.x < b._startX - b._range) b._dir =  1;
    b.body.reset(b.x, b.y);
  });
}
 
// HUD via DOM - completament fora de Phaser, sense problemes de zoom ni scroll
var _hudMNeeded = 5;
function createHUD(scene, nivell, mNeeded) {
  _hudMNeeded = mNeeded;
  document.getElementById('hud-box').style.display = 'block';
  document.getElementById('hud-nivell').style.display = 'block';
  document.getElementById('hud-monedes').textContent = 'Monedes: 0/' + mNeeded;
  document.getElementById('hud-punts').textContent = 'Punts: ' + scoreGlobal;
  document.getElementById('hud-nivell').textContent = 'NIVELL ' + nivell;
  // Retornem objectes amb metode setText per compatibilitat amb el codi existent
  var txtMonedes = { setText: function(t){ document.getElementById('hud-monedes').textContent = t; } };
  var txtPunts   = { setText: function(t){ document.getElementById('hud-punts').textContent = t; } };
  return {txtMonedes, txtPunts};
}

function updateHUD(scene) {}
 
function mostrarMissatge(scene, text, cb) {
  scene.add.rectangle(W/2,H/2,440,130,0x000000,0.88).setScrollFactor(0).setDepth(60);
  scene.add.text(W/2,H/2,text,{fontSize:'19px',fill:'#fff',fontFamily:'monospace',align:'center',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(61);
  scene.time.delayedCall(2500,cb,[],scene);
}

// ─────────────────────────────────────────────
// NIVELL 1
// ─────────────────────────────────────────────
class Level1Scene extends Phaser.Scene {
  constructor() { super({key:'Level1Scene'}); }
 
  create() {
    scoreGlobal = 0; this.dead = false; this.won = false; this.mCount = 0; this.mNeeded = 5;
    var MAP_W = 60*32, MAP_H = 20*32;
    this.physics.world.setBounds(0,0,MAP_W,MAP_H);
    this.physics.world.gravity.y = 600;
 
    if (this.textures.exists('bg1'))
      this.add.image(MAP_W/2,MAP_H/2,'bg1').setDisplaySize(MAP_W,MAP_H).setDepth(-10);
    else
      this.add.rectangle(MAP_W/2,MAP_H/2,MAP_W,MAP_H,0x1a2a3a).setDepth(-10);
 
    this.platforms = buildPlatforms(this, PLAT1);
    this.player    = createPlayer(this, 208, 448 - 300*0.12 - 5);
    this.physics.add.collider(this.player, this.platforms);
 
    this.monedes = this.physics.add.staticGroup();
    COINS1.forEach(function(pos){ var m=this.monedes.create(pos[0],pos[1],'moneda').setScale(0.14); m.body.setSize(m.width*0.08/0.14, m.height*0.08/0.14); m.refreshBody(); },this);
    this.physics.add.overlap(this.player, this.monedes, this.agafarMoneda, null, this);
 
    this.bombList = createPatrolBombs(this, BOMBS1);
    this.bombList.forEach(b => this.physics.add.overlap(this.player, b, this.tocarBomba, null, this));
 
    this.cameras.main.setBounds(0,0,MAP_W,MAP_H);
    this.cameras.main.startFollow(this.player,true,0.08,0.08);
    this.cameras.main.setZoom(1.5);
 
    var hud = createHUD(this,1,this.mNeeded);
    this.txtMonedes = hud.txtMonedes; this.txtPunts = hud.txtPunts;
 
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._lastDir='r'; this._wasOnGround=false; this._jumping=false;
 
    startBgMusic(this);
  }
 
  agafarMoneda(player, moneda) {
    moneda.disableBody(true,true);
    scoreGlobal += 10; this.mCount++;
    this.txtPunts.setText('Punts: '+scoreGlobal);
    this.txtMonedes.setText('Monedes: '+this.mCount+'/'+this.mNeeded);
    if (this.cache.audio.exists('snd_moneda')) this.sound.play('snd_moneda',{volume:0.7});
    var em = this.add.particles(moneda.x,moneda.y,'moneda',{speed:80,scale:{start:0.08,end:0},lifespan:400,quantity:5}).setDepth(20);
    this.time.delayedCall(800,function(){ if(em&&em.active)em.destroy(); });
    if (this.mCount >= this.mNeeded) {
      this.won = true; scoreGlobal += 50;
      mostrarMissatge(this,'Nivell 1 superat!\n+50 punts\nPassant al Nivell 2...',function(){
        this.scene.start('Level2Scene',{punts:scoreGlobal});
      });
    }
  }
 
  tocarBomba() {
    if (this.dead) return;
    this.dead=true; this.physics.pause(); this.player.setTint(0xff3333);
    if (this.cache.audio.exists('snd_derrota')) this.sound.play('snd_derrota',{volume:0.8});
    mostrarMissatge(this,'BOOM! Has explotat!\nPunts: '+scoreGlobal,function(){
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'bomba'});
    });
  }
 
  caureAlBuit() {
    if (this.dead) return;
    this.dead=true; this.physics.pause(); this.player.setTint(0x4444ff);
    if (this.cache.audio.exists('snd_derrota')) this.sound.play('snd_derrota',{volume:0.8});
    mostrarMissatge(this,"Has caigut al buit!\nUn altre cop serà!\nPunts: "+scoreGlobal,function(){
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'buit'});
    });
  }
 
  update() {
    if (this.dead || this.won) return;
    updatePlayer(this);
    if (this.player.y > 20*32+50) this.caureAlBuit();
    updateBombs(this.bombList);
    updateHUD(this);
  }
}
 
// ─────────────────────────────────────────────
// NIVELL 2
// ─────────────────────────────────────────────
class Level2Scene extends Phaser.Scene {
  constructor() { super({key:'Level2Scene'}); }
  init(data) { if (data&&data.punts) scoreGlobal=data.punts; }
 
  create() {
    this.dead=false; this.won=false; this.mCount=0; this.mNeeded=8;
    var MAP_W=60*32, MAP_H=20*32;
    this.physics.world.setBounds(0,0,MAP_W,MAP_H);
    this.physics.world.gravity.y=600;
 
    if (this.textures.exists('bg2'))
      this.add.image(MAP_W/2,MAP_H/2,'bg2').setDisplaySize(MAP_W,MAP_H).setDepth(-10);
    else
      this.add.rectangle(MAP_W/2,MAP_H/2,MAP_W,MAP_H,0x0a1a2a).setDepth(-10);
 
    this.platforms = buildPlatforms(this,PLAT2);
    this.player    = createPlayer(this,220,448-300*0.12-5);
    this.physics.add.collider(this.player,this.platforms);
 
    this.monedes = this.physics.add.staticGroup();
    COINS2.forEach(function(pos){ var m=this.monedes.create(pos[0],pos[1],'moneda').setScale(0.14); m.body.setSize(m.width*0.08/0.14, m.height*0.08/0.14); m.refreshBody(); },this);
    this.physics.add.overlap(this.player,this.monedes,this.agafarMoneda,null,this);
 
    this.bombList = createPatrolBombs(this,BOMBS2);
    this.bombList.forEach(b => this.physics.add.overlap(this.player,b,this.tocarBomba,null,this));
 
    this.cameras.main.setBounds(0,0,MAP_W,MAP_H);
    this.cameras.main.startFollow(this.player,true,0.08,0.08);
    this.cameras.main.setZoom(1.5);
 
    var hud = createHUD(this,2,this.mNeeded);
    this.txtMonedes=hud.txtMonedes; this.txtPunts=hud.txtPunts;
    this.add.text(W/2,H-18,'Recull 8 monedes!',{fontSize:'13px',fill:'#ffdd44',fontFamily:'monospace',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setScrollFactor(0).setDepth(50);
 
    this.cursors  = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this._lastDir='r'; this._wasOnGround=false; this._jumping=false;
 
    startBgMusic(this);
  }
 
  agafarMoneda(player,moneda) {
    moneda.disableBody(true,true);
    scoreGlobal+=10; this.mCount++;
    this.txtPunts.setText('Punts: '+scoreGlobal);
    this.txtMonedes.setText('Monedes: '+this.mCount+'/'+this.mNeeded);
    if (this.cache.audio.exists('snd_moneda')) this.sound.play('snd_moneda',{volume:0.7});
    var em=this.add.particles(moneda.x,moneda.y,'moneda',{speed:80,scale:{start:0.08,end:0},lifespan:400,quantity:5}).setDepth(20);
    this.time.delayedCall(800,function(){ if(em&&em.active)em.destroy(); });
    if (this.mCount>=this.mNeeded) {
      this.won=true; scoreGlobal+=100;
      mostrarMissatge(this,'HAS GUANYAT!\n+100 punts\nPunts finals: '+scoreGlobal,function(){
        this.scene.start('GameOverScene',{guanyat:true,punts:scoreGlobal});
      });
    }
  }
 
  tocarBomba() {
    if (this.dead) return;
    this.dead=true; this.physics.pause(); this.player.setTint(0xff3333);
    if (this.cache.audio.exists('snd_derrota')) this.sound.play('snd_derrota',{volume:0.8});
    mostrarMissatge(this,'BOOM! Has explotat!\nPunts: '+scoreGlobal,function(){
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'bomba'});
    });
  }
 
  caureAlBuit() {
    if (this.dead) return;
    this.dead=true; this.physics.pause(); this.player.setTint(0x4444ff);
    if (this.cache.audio.exists('snd_derrota')) this.sound.play('snd_derrota',{volume:0.8});
    mostrarMissatge(this,"Has caigut al buit!\nUn altre cop serà!\nPunts: "+scoreGlobal,function(){
      this.scene.start('GameOverScene',{guanyat:false,punts:scoreGlobal,missatge:'buit'});
    });
  }
 
  update() {
    if (this.dead||this.won) return;
    updatePlayer(this);
    if (this.player.y>20*32+50) this.caureAlBuit();
    updateBombs(this.bombList);
    updateHUD(this);
  }
}
 
// ─────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────
class GameOverScene extends Phaser.Scene {
  constructor() { super({key:'GameOverScene'}); }
  init(data) {
    this.guanyat  = data ? !!data.guanyat : false;
    this.punts    = data ? (data.punts||scoreGlobal) : scoreGlobal;
    this.missatge = data ? (data.missatge||'bomba') : 'bomba';
  }
  create() {
    if (bgMusic&&bgMusic.isPlaying) { bgMusic.stop(); bgMusic=null; }
    document.getElementById('hud-box').style.display='none';
    document.getElementById('hud-nivell').style.display='none';
    this.add.rectangle(W/2,H/2,W,H,0x060610);
    if (this.textures.exists('logotip'))
      this.add.image(W/2,72,'logotip').setScale(0.22).setAlpha(0.6);
    this.add.text(W/2,155,this.guanyat?'ENHORABONA!':'GAME OVER',{
      fontSize:'22px',fill:this.guanyat?'#66ff88':'#ff4444',fontFamily:'"Press Start 2P"',stroke:'#000',strokeThickness:4
    }).setOrigin(0.5);
    this.add.text(W/2,215,this.guanyat?'Has completat els dos nivells!':(this.missatge==='buit'?"Un altre cop serà!! \uD83D\uDE05":'Has tocat una bomba...'),
      {fontSize:'18px',fill:'#aaaacc',fontFamily:'monospace'}).setOrigin(0.5);
    this.add.text(W/2,268,'Puntuaci\u00f3: '+this.punts,{fontSize:'16px',fill:'#ffdd44',fontFamily:'"Press Start 2P"',stroke:'#443300',strokeThickness:3}).setOrigin(0.5);
    this.add.text(W/2,350,'POL FERR\u00c9 \u2013 CoinJump',{fontSize:'14px',fill:'#444466',fontFamily:'monospace',align:'center'}).setOrigin(0.5);
    var btn=this.add.text(W/2,428,'[ ESPAI \u2013 Torna a jugar ]',{fontSize:'10px',fill:'#66aaff',fontFamily:'"Press Start 2P"',stroke:'#000033',strokeThickness:2}).setOrigin(0.5);
    this.tweens.add({targets:btn,alpha:0.1,duration:600,yoyo:true,repeat:-1});
    var eTex=this.guanyat?(this.textures.exists('moneda')?'moneda':null):(this.textures.exists('bomba')?'bomba':null);
    if (eTex) this.add.particles(0,0,eTex,{x:{min:0,max:W},y:-10,scale:{start:0.09,end:0},alpha:{start:0.7,end:0},speedY:{min:60,max:130},lifespan:4000,frequency:this.guanyat?200:600,quantity:1});
    this.input.keyboard.once('keydown-SPACE',function(){ scoreGlobal=0; this.scene.start('TitleScene'); },this);
  }
}
 
// ─────────────────────────────────────────────
// INICIAR JOC
// ─────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  physics: {default:'arcade', arcade:{gravity:{y:0}, debug:false}},
  scene: [BootScene, LoadingScene, TitleScene, Level1Scene, Level2Scene, GameOverScene]
});
